<!DOCTYPE html>
<html>
<head>
  <title>Resources - AERSK</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1a2b;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      border-bottom: 1px solid #333;
    }

    .logo {
      color: #8ec5ff;
      font-size: 34px;
      font-weight: bold;
      text-decoration: none;
    }

    nav a {
      margin-left: 25px;
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      color: #8ec5ff;
    }

    .content {
      padding: 40px 60px;
    }

    h1 {
      color: #8ec5ff;
      margin-bottom: 20px;
    }

    .main {
      display: flex;
      gap: 40px;
      align-items: stretch;
    }

    .resources {
      flex: 2;
      display: flex;
      flex-direction: column;
    }

    .resource {
      margin-bottom: 20px;
      padding: 20px;
      background: #12263a;
      border-left: 4px solid #8ec5ff;
    }

    .resource strong {
      font-size: 16px;
    }

    .resource a {
      display: inline-block;
      margin-top: 8px;
      color: #8ec5ff;
      text-decoration: none;
    }

    .resource a:hover {
      text-decoration: underline;
    }

    .side-image {
      flex: 1;
      display: flex;
    }

    .side-image img {
      width: 100%;
      height: 100%;
      max-height: 100%;
      border-radius: 12px;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <header>
    <a href="index.html" class="logo">AERSK</a>

    <nav>
      <a href="learn.html">Learn</a>
      <a href="resources.html">Resources</a>
      <a href="Aboutus.html">About Us</a>
    </nav>
  </header>

  <div class="content">
    <h1>Resources</h1>

    <div class="main">

      <div class="resources">

        <div class="resource">
          <strong>Budgeting Review</strong>
          <a href="https://www.jetir.org/papers/JETIREO06050.pdf">
            View PDF
          </a>
        </div>

        <div class="resource">
          <strong>Budgeting Worksheet</strong>
          <a href="https://www.psecu.com/hubfs/21275437%20WalletWorks%20Budgeting%20Worksheet%200421.pdf">
            View PDF
          </a>
        </div>

        <div class="resource">
          <strong>Guide to Saving and Spending</strong>
          <a href="https://www.minsterbank.com/wp-content/uploads/2025/03/Beginners-Guide-to-Saving-Spending-Final.pdf">
            View PDF
          </a>
        </div>

        <div class="resource">
          <strong>How to Investing as a beginner</strong>
          <a href="https://www.fpinternational.com/documents/inv-beg-guide-row.pdf">
            View PDF
          </a>
        </div>

        <div class="resource">
          <strong>Saving & Investing Workbook</strong>
          <a href="https://www.sec.gov/investor/pubs/savings-investing-for-students.pdf">
            View PDF
          </a>
        </div>

      </div>

      <div class="side-image">
        <img src="Resourcesimage.jpg">
      </div>

    </div>

  </div>

</body>
</html>
